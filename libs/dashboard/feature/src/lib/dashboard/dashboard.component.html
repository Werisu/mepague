<div class="dashboard-shell">
  <section class="dashboard-hero">
    <div class="dashboard-hero__glow"></div>
    <app-page-header
      title="Dashboard"
      subtitle="O que usaram de você e o que já te pagaram"
      tone="light"
    />

    <div class="dashboard-metrics">
      <app-summary-card
        label="Total utilizado"
        [value]="totalEmprestado | currency:'BRL'"
      />
      <app-summary-card
        label="Já te pagou"
        [value]="totalRecebido | currency:'BRL'"
        variant="paid"
      />
      <app-summary-card
        label="Ainda te deve"
        [value]="saldoPendente | currency:'BRL'"
        variant="pending"
      />
    </div>
  </section>

  <section class="dashboard-table">
    <app-transaction-table
      [transactions]="transactions"
      [debtors]="debtors"
      (statusToggle)="onMarkAsPaid($event)"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
    />
  </section>
</div>
