<div class="flex flex-col gap-4">
  <div class="flex flex-wrap gap-4 items-center">
    <button
      type="button"
      class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors"
      (click)="export()"
    >
      Exportar dados
    </button>
    <label class="relative cursor-pointer">
      <input
        type="file"
        class="sr-only"
        accept=".json,application/json"
        (change)="onFileSelected($event)"
        [disabled]="importing"
      />
      <span
        class="inline-block px-4 py-2 rounded-lg text-sm font-semibold bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors disabled:opacity-50"
      >
        {{ importing ? 'Importando...' : 'Importar dados' }}
      </span>
    </label>
  </div>
  @if (importSuccess) {
    <p class="text-sm text-green-600 font-medium">Dados importados com sucesso!</p>
  }
  @if (importError) {
    <p class="text-sm text-red-600 font-medium">Arquivo inválido. Use um backup exportado anteriormente.</p>
  }
</div>
