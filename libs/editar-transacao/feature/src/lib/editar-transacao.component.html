<div class="max-w-7xl mx-auto px-4 py-10 md:px-6 md:py-12">
  @if (!transaction) {
    <div class="rounded-2xl bg-red-50 border border-red-200 p-6">
      <p class="text-red-800 font-medium">Transação não encontrada.</p>
      <a routerLink="/dashboard" class="mt-2 inline-block text-red-700 font-semibold hover:underline">
        Voltar ao Dashboard →
      </a>
    </div>
  } @else {
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-slate-800">Editar transação</h1>
      <p class="mt-2 text-slate-500">Altere os dados da transação</p>
    </header>

    <app-transaction-form
      [debtors]="debtors"
      [transaction]="transaction"
      (submitForm)="onSubmit($event)"
    />
  }
</div>
