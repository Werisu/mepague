<div class="max-w-[920px] mx-auto px-4 py-10 md:px-6 md:py-12">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Histórico</h1>
    <p class="mt-2 text-slate-500">Tudo que usaram de você e o que já te pagaram</p>
  </header>

  <!-- Filtros -->
  <div class="flex gap-2 mb-6">
    <button
      type="button"
      class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors"
      [class]="filter() === 'all'
        ? 'bg-slate-800 text-white'
        : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      (click)="filter.set('all')"
    >
      Todas
    </button>
    <button
      type="button"
      class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors"
      [class]="filter() === 'pending'
        ? 'bg-red-600 text-white'
        : 'bg-red-50 text-red-700 hover:bg-red-100'"
      (click)="filter.set('pending')"
    >
Não te pagou
        </button>
        <button
          type="button"
          class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors"
          [class]="filter() === 'paid'
            ? 'bg-green-600 text-white'
            : 'bg-green-50 text-green-700 hover:bg-green-100'"
          (click)="filter.set('paid')"
        >
          Já te pagou
    </button>
  </div>

  <!-- Tabela (sem ações de edição no histórico) -->
  <app-transaction-table
    [transactions]="filteredTransactions()"
    [showActions]="false"
  />
</div>
