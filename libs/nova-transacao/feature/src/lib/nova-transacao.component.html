<div class="max-w-7xl mx-auto px-4 py-10 md:px-6 md:py-12">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Nova Transação</h1>
    <p class="mt-2 text-slate-500">Registre um valor que alguém usou de você</p>
  </header>

  @if (debtors.length === 0) {
    <div class="rounded-2xl bg-amber-50 border border-amber-200 p-6 mb-6">
      <p class="text-amber-800 font-medium">Cadastre um devedor antes de registrar transações.</p>
      <a routerLink="/devedores" class="mt-2 inline-block text-amber-700 font-semibold hover:underline">
        Ir para Devedores →
      </a>
    </div>
  } @else {
    <app-transaction-form
      [debtors]="debtors"
      (submitForm)="onSubmit($event)"
    />
  }
</div>
