<header class="mb-12 text-center">
  @if (tone() === 'light') {
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white drop-shadow-sm">
      {{ title() }}
    </h1>
  } @else {
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 via-violet-600 to-purple-600 bg-clip-text text-transparent drop-shadow-sm">
      {{ title() }}
    </h1>
  }
  @if (subtitle()) {
    <p
      class="mt-2 text-lg font-medium"
      [class.text-slate-500]="tone() === 'default'"
      [class.text-violet-100]="tone() === 'light'"
    >
      {{ subtitle() }}
    </p>
  }
</header>
