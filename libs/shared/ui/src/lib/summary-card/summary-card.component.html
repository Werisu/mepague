<article
  class="summary-card"
  [ngClass]="{
    'summary-card--default': variant() === 'default',
    'summary-card--paid': variant() === 'paid',
    'summary-card--pending': variant() === 'pending'
  }"
>
  <header class="summary-card__header">
    <span class="summary-card__label">{{ label() }}</span>
    <span class="summary-card__dot"></span>
  </header>

  <p class="summary-card__value">{{ value() }}</p>

  <div class="summary-card__footer">
    <span class="summary-card__badge">
      {{
        variant() === 'paid' ? 'Entradas' : variant() === 'pending' ? 'Pendências' : 'Total'
      }}
    </span>
  </div>
</article>
