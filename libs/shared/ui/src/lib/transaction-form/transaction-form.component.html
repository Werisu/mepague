<section class="rounded-2xl bg-white/90 backdrop-blur-sm border border-slate-200/80 shadow-lg shadow-slate-200/50 p-6">
  <h2 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2">
    <span class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 font-extrabold text-sm">+</span>
    Registrar valor usado
  </h2>
  <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_2fr_1fr] gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-600" for="devedor">Quem usou</label>
        <select
          id="devedor"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
          [ngModel]="debtorId()"
          (ngModelChange)="debtorId.set($event)"
          name="debtorId"
          required
        >
          <option [ngValue]="null">Selecione o devedor</option>
          @for (debtor of debtors(); track debtor.id) {
            <option [ngValue]="debtor.id">{{ debtor.name }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-600" for="valor">Valor</label>
        <input
          id="valor"
          type="number"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
          [ngModel]="value()"
          (ngModelChange)="value.set($event)"
          name="valor"
          min="0.01"
          step="0.01"
          placeholder="0,00"
          required
        />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-600" for="descricao">Descrição</label>
        <input
          id="descricao"
          type="text"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
          name="descricao"
          placeholder="Ex: Compras no supermercado"
          required
        />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-600" for="data">Data</label>
        <input
          id="data"
          type="date"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
          [ngModel]="date()"
          (ngModelChange)="date.set($event)"
          name="data"
          required
        />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-600" for="cartao">Cartão utilizado</label>
        <input
          id="cartao"
          type="text"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
          [ngModel]="cartao()"
          (ngModelChange)="cartao.set($event)"
          name="cartao"
          placeholder="Ex: Nubank, Itaú"
        />
      </div>
      <div class="flex items-end gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="checkbox"
            class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
            [ngModel]="parcelado()"
            (ngModelChange)="parcelado.set($event)"
            name="parcelado"
          />
          <span class="text-sm font-semibold text-slate-600">Parcelado</span>
        </label>
        @if (parcelado()) {
          <div class="flex flex-col gap-1.5 flex-1">
            <label class="text-sm font-semibold text-slate-600" for="parcelas">Em quantas vezes</label>
            <input
              id="parcelas"
              type="number"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all"
              [ngModel]="parcelas()"
              (ngModelChange)="parcelas.set($event)"
              name="parcelas"
              min="1"
              max="48"
            />
          </div>
        }
      </div>
    </div>

    <div class="flex justify-end">
      <button
        type="submit"
        class="px-6 py-2.5 rounded-xl font-semibold text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 shadow-md hover:shadow-lg transition-all duration-200 active:scale-[0.98]"
      >
        Adicionar
      </button>
    </div>
  </form>
</section>
