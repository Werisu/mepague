<section class="form-section">
  <h2 class="form-section__title">Novo lançamento</h2>
  <form class="form" (ngSubmit)="onSubmit()">
    <div class="form__group">
      <label class="form__label" for="valor">Valor</label>
      <input
        id="valor"
        type="number"
        class="form__input"
        [ngModel]="value()"
        (ngModelChange)="value.set($event)"
        name="valor"
        min="0"
        step="0.01"
        placeholder="0,00"
        required
      />
    </div>
    <div class="form__group">
      <label class="form__label" for="descricao">Descrição</label>
      <input
        id="descricao"
        type="text"
        class="form__input"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        name="descricao"
        placeholder="Ex: Empréstimo para almoço"
        required
      />
    </div>
    <div class="form__group">
      <label class="form__label" for="data">Data</label>
      <input
        id="data"
        type="date"
        class="form__input"
        [ngModel]="date()"
        (ngModelChange)="date.set($event)"
        name="data"
        required
      />
    </div>
    <button type="submit" class="form__button">Adicionar lançamento</button>
  </form>
</section>
